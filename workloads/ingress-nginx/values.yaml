# Values are nested under the dependency chart name "ingress-nginx".
ingress-nginx:
  controller:
    replicaCount: 2
    service:
      type: LoadBalancer        # Octavia provisions an external floating IP
    ingressClassResource:
      name: nginx               # IngressClass this controller owns
      default: false            # not the cluster-wide default (we'll run several controllers)
    admissionWebhooks:
      enabled: true
