apiVersion: apps/v1
kind: Deployment
metadata:
  name: connectivity-checker
  namespace: cross-cluster-demo
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: connectivity-checker
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: connectivity-checker
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - "echo \"=== Connectivity Checker started ===\"\necho \"Cluster A -> Cluster\
          \ B via Submariner + Lighthouse\"\necho \"\"\nwhile true; do\n  TS=$(date\
          \ -u \"+%Y-%m-%dT%H:%M:%SZ\")\n  RESULT=$(curl -s --max-time 5 -o /dev/null\
          \ -w \"%{http_code}\" \\\n    http://nginx.cross-cluster-demo.svc.clusterset.local)\n\
          \  if [ \"$RESULT\" = \"200\" ]; then\n    echo \"$TS  [OK $RESULT]  nginx.cross-cluster-demo.svc.clusterset.local\"\
          \n  else\n    echo \"$TS  [FAIL $RESULT]  nginx.cross-cluster-demo.svc.clusterset.local\"\
          \n  fi\n  sleep 10\ndone\n"
        image: registry.k8s.io/e2e-test-images/agnhost:2.43
        imagePullPolicy: IfNotPresent
        name: checker
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-client
  namespace: cross-cluster-demo
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: demo-client
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: demo-client
    spec:
      containers:
      - command:
        - sleep
        - infinity
        env:
        - name: NGINX_URL
          value: http://nginx.cross-cluster-demo.svc.clusterset.local
        - name: GRPCBIN_HOST
          value: grpcbin.cross-cluster-demo.svc.clusterset.local:9000
        image: registry.k8s.io/e2e-test-images/agnhost:2.43
        imagePullPolicy: IfNotPresent
        name: client
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: cross-cluster-demo
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: whoami
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - env:
        - name: WHOAMI_NAME
          value: "CLUSTER-A (isolated \xB7 pods 10.48 / svc 10.56)"
        image: traefik/whoami
        imagePullPolicy: Always
        name: whoami
        ports:
        - containerPort: 80
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: cross-cluster-demo
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: whoami
  type: ClusterIP
---
apiVersion: multicluster.x-k8s.io/v1alpha1
kind: ServiceExport
metadata:
  name: whoami
  namespace: cross-cluster-demo
