# cass-operator reads this and builds a Cassandra ring. PoC: single node, 50 Gi block PVC (#7).
apiVersion: cassandra.datastax.com/v1beta1
kind: CassandraDatacenter
metadata:
  name: dc1
  namespace: cass-operator
spec:
  clusterName: cassandra
  serverType: cassandra
  serverVersion: "4.1.7"
  size: 1                                # single node for the PoC (fits the 8 GB workers)
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      memory: 4Gi
  storageConfig:
    cassandraDataVolumeClaimSpec:
      storageClassName: default          # cluster default SC (Cinder/Ceph, RWO)
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 50Gi                  # #4/#7: 50 Gi block PVC
