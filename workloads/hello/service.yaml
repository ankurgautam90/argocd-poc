# A Service = a stable internal name/address to reach the pods.
apiVersion: v1               # the core rulebook, v1 — where Service lives
kind: Service                # object type
metadata:
  name: hello
  namespace: hello
spec:
  type: ClusterIP            # INTERNAL ONLY — no public IP, no load balancer
  selector:
    app: hello               # send traffic to pods tagged app=hello
  ports:
    - port: 80               # the Service's port
      targetPort: 80         # forwards to the container's port 80
