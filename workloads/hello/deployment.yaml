# Plain Kubernetes manifest (no Helm). A Deployment = run + keep containers alive.
apiVersion: apps/v1          # the "apps" rulebook, v1 — where Deployment lives
kind: Deployment             # object type
metadata:
  name: hello
  namespace: hello
  labels:
    app: hello               # a tag on this Deployment
spec:
  replicas: 1                # run 1 copy (bump later to watch ArgoCD reconcile)
  selector:
    matchLabels:
      app: hello             # this Deployment owns pods tagged app=hello
  template:                  # the pod "blueprint" it stamps out
    metadata:
      labels:
        app: hello           # each pod gets tagged app=hello (matches selector)
    spec:
      containers:
        - name: hello
          image: nginx:1.27-alpine   # small, reliable image
          ports:
            - containerPort: 80       # the container listens on 80
