# Cassandra instance (#7). A CassandraDatacenter CR that cass-operator turns into a running ring.
# NOTE: cass-operator only watches its OWN namespace, so the CR lives in cass-operator ns.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cassandra
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"          # after operators
spec:
  project: default
  source:
    repoURL: https://github.com/ankurgautam90/argocd-poc.git
    targetRevision: main
    path: workloads/cassandra
  destination:
    server: https://kubernetes.default.svc
    namespace: cass-operator                     # must match the operator's watched ns
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
