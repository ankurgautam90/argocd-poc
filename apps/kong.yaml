# Kong (OSS) — API gateway / ingress. Covers #2 (one LB IP, multi-protocol), #3 (annotations),
# #13 (Gateway API), #18 (ETP=Local pod-reschedule). DB-less mode (config from k8s, no Postgres).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kong
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.konghq.com
    chart: kong
    targetRevision: "3.4.1"
    helm:
      values: |
        replicaCount: 2                          # >=2 for zero-drop reschedule (#18)
        ingressController:
          enabled: true                          # Kong Ingress Controller (watches Ingress + Gateway API)
        proxy:
          type: LoadBalancer
          loadBalancerIP: "103.240.25.21"        # pin the FIP — the correct OpenStack way (NOT an annotation)
          externalTrafficPolicy: Local           # preserve client source IP (#18)
          annotations:
            loadbalancer.openstack.org/keep-floatingip: "true"   # retain the FIP if the Service is deleted
        podDisruptionBudget:
          enabled: true
          minAvailable: 1                         # keep >=1 during node drains (#18, #25)
        affinity:
          podAntiAffinity:                        # spread the 2 replicas across nodes
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: kong
                  topologyKey: kubernetes.io/hostname
  destination:
    server: https://kubernetes.default.svc
    namespace: kong
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
