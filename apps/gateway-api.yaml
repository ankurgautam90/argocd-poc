# Gateway API CRDs (standard channel) — needed for #13 (Gateway API) and Kong's Gateway support.
# Installed straight from the upstream git repo (no Helm chart for these CRDs).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"          # before Kong (wave 1)
spec:
  project: default
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api
    targetRevision: v1.6.0
    path: config/crd/standard                   # the standard-channel CRDs
  destination:
    server: https://kubernetes.default.svc
    namespace: default                           # CRDs are cluster-scoped; ns is irrelevant
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true                     # CRDs are large
